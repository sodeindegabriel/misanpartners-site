      <!-- TODO(backend): replace the interim handler in this page's script with real,

      <form class="gate-form" id="gateForm" action="/api/auth/login" method="post" autocomplete="on" novalidate>
        <label class="field">
          <span class="flabel">Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </label>
        <label class="field">
          <span class="flabel">Password</span>
          <div class="pw-wrap">
            <input type="password" name="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••">
            <button type="button" class="pw-toggle" data-target="loginPassword">Show</button>
          </div>
        </label>
        <button type="submit" class="enter">Enter</button>
        <p class="micro"><a href="#" id="forgotLink" style="color:inherit;text-decoration:underline;cursor:pointer">Forgot password?</a></p>
      </form>
      <form class="gate-form" id="forgotForm" autocomplete="off" novalidate style="display:none">
        <label class="field">
          <span class="flabel">Email</span>
          <input type="email" id="forgotEmail" required autocomplete="email" placeholder="you@example.com">
        </label>
        <button type="submit" class="enter">Send Reset Link</button>
        <p class="micro"><a href="#" id="backToLogin" style="color:inherit;text-decoration:underline;cursor:pointer">Back to sign in</a></p>
      </form>
      <p class="micro">Access by invitation</p>
      <p class="gate-msg" id="gateMsg" role="status" aria-live="polite"></p>

  <script>
    (function () {
      var toggles = document.querySelectorAll('.pw-toggle');
      for (var i = 0; i < toggles.length; i++) {
        toggles[i].addEventListener('click', function () {
          var input = document.getElementById(this.getAttribute('data-target'));
          if (!input) return;
          var isHidden = input.type === 'password';
          input.type = isHidden ? 'text' : 'password';
          this.textContent = isHidden ? 'Hide' : 'Show';
        });
      }
    })();
  </script>
  <script>
    (function () {
      var f = document.getElementById('gateForm');
      var m = document.getElementById('gateMsg');
      var btn = f ? f.querySelector('.enter') : null;
      if (!f) return;
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = f.email.value;
        var password = f.password.value;
        var originalLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Checking...';
        m.textContent = '';

        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password }),
        })
          .then(function (res) {
            if (res.ok) {
              window.location.href = '/investors/portal/';
              return;
            }
            btn.disabled = false;
            btn.textContent = originalLabel;
            m.textContent = 'Access denied. Please check your credentials.';
          })
          .catch(function () {
            btn.disabled = false;
            btn.textContent = originalLabel;
            m.textContent = 'Access denied. Please check your credentials.';
          });
      });
    })();
  </script>
  <script>
    (function () {
      // Handle Supabase invite/recovery/signup token in the URL hash
      // (e.g. #access_token=xxx&refresh_token=yyy&type=invite) by handing it
      // off to the password-setup page, passing the tokens through unchanged.
      var hash = window.location.hash;
      if (!hash || hash.indexOf('access_token') === -1) return;

      var params = new URLSearchParams(hash.substring(1));
      var accessToken = params.get('access_token');
      var type = params.get('type');

      if (!accessToken || (type !== 'invite' && type !== 'recovery' && type !== 'signup')) return;

      window.location.href = '/investors/setup' + hash;
    })();
  </script>
  <script>
    (function () {
      var gateForm = document.getElementById('gateForm');
      var forgotForm = document.getElementById('forgotForm');
      var forgotLink = document.getElementById('forgotLink');
      var backToLogin = document.getElementById('backToLogin');
      var m = document.getElementById('gateMsg');
      if (!forgotForm || !forgotLink || !backToLogin) return;

      forgotLink.addEventListener('click', function (e) {
        e.preventDefault();
        gateForm.style.display = 'none';
        forgotForm.style.display = '';
        m.textContent = '';
      });

      backToLogin.addEventListener('click', function (e) {
        e.preventDefault();
        forgotForm.style.display = 'none';
        gateForm.style.display = '';
        m.textContent = '';
      });

      forgotForm.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('forgotEmail').value;
        var btn = forgotForm.querySelector('.enter');
        var original = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Sending...';
        m.textContent = '';

        fetch('/api/auth/resetpassword', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email }),
        })
          .then(function (res) {
            btn.disabled = false;
            btn.textContent = original;
            if (res.ok) {
              m.textContent = 'Check your email for a reset link.';
              return;
            }
            m.textContent = 'Could not send reset link. Please try again.';
          })
          .catch(function () {
            btn.disabled = false;
            btn.textContent = original;
            m.textContent = 'Could not send reset link. Please try again.';
          });
      });
    })();
  </script>
